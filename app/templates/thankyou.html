{% extends "base.html" %}
{% set active_page = "projects" %}

{% block title %}Projects - Soumyajit Das{% endblock %}

{% block content %}
<main style="padding-top: 100px; min-height: calc(100vh - 100px); display: flex; align-items: center; justify-content: center;">
    <section class="section">
      <div class="container">
        <div class="reveal text-center card" style="max-width: 600px; margin: 0 auto; padding: var(--space-xl);">
          <div style="font-size: 4rem; color: var(--accent-primary); margin-bottom: var(--space-md);">
            <i class="fas fa-check-circle"></i>
          </div>
          <h1 class="text-gradient" style="font-size: 3rem; margin-bottom: var(--space-md);">Thank You!</h1>
          <p class="text-secondary" style="font-size: 1.2rem; margin-bottom: var(--space-lg);">
            Your message has been received successfully. I will get in touch with you shortly.
          </p>
          <a href="/" class="btn btn-primary magnetic">Return to Home</a>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
{% endblock %}
