{% extends "base.html" %}
{% set active_page = "contact" %}

{% block title %}Contact - Soumyajit Das{% endblock %}

{% block content %}
<main style="padding-top: 100px; min-height: 100vh;">
    <section class="section">
      <div class="container">
        <div class="reveal text-center" style="margin-bottom: var(--space-xl);">
          <h1 class="text-gradient" style="font-size: 3.5rem;">Get In Touch</h1>
          <p class="text-secondary" style="font-size: 1.2rem;">I'm currently open for new opportunities.</p>
        </div>

        <div class="grid grid-cols-2" style="align-items: start;">
          <!-- Contact Form -->
          <div class="reveal">
            <form action="/submit_form" method="POST" name="contact-form" class="card">
              <h3 style="margin-bottom: var(--space-lg);">Send me a message</h3>
              
              <div class="form-group">
                <input type="text" class="form-control" id="name" name="name" placeholder="Name" required>
              </div>
              <div class="form-group">
                <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
              </div>
              <div class="form-group">
                <input type="text" class="form-control" id="subject" name="subject" placeholder="Subject" required>
              </div>
              <div class="form-group">
                <textarea class="form-control" name="message" placeholder="Enter your message" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary magnetic" style="width: 100%;" name="send">Send Message</button>
            </form>
          </div>

          <!-- Social Links -->
          <div class="reveal" style="display: flex; flex-direction: column; gap: var(--space-lg);">

            <div class="card">
              <h3 style="margin-bottom: var(--space-md);">Follow Me</h3>
              <div style="display: flex; gap: 1rem;">
                <a href="https://github.com/soumyajitcodes" target="_blank" rel="noopener noreferrer" style="width: 45px; height: 45px; border-radius: 50%; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all var(--transition-fast);">
                  <i class="fab fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/soumyajit09/" target="_blank" rel="noopener noreferrer" style="width: 45px; height: 45px; border-radius: 50%; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all var(--transition-fast);">
                  <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="https://x.com/soumyaaaajit" target="_blank" rel="noopener noreferrer" style="width: 45px; height: 45px; border-radius: 50%; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all var(--transition-fast);">
                  <i class="fab fa-x-twitter"></i>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
{% endblock %}
