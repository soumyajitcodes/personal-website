<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of Soumyajit Das - Python Developer and Machine Learning Enthusiast">
  
  <meta property="og:title" content="Soumyajit Das - Backend Developer & GenAI Engineer">
  <meta property="og:description" content="Portfolio of Soumyajit Das - Systems Engineer specializing in Backend and Generative AI.">
  <meta property="og:image" content="/static/assets/images/profil.jpeg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  
  <link rel="apple-touch-icon" sizes="180x180" href="/static/assets/apple-icon-180x180.png">
  <link rel="icon" href="/static/assets/apple-icon-180x180.png">
  
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <title>{% block title %}Soumyajit Das - Portfolio{% endblock %}</title>
  <link href="/static/style.css" rel="stylesheet">
  {% block head %}{% endblock %}
</head>

<body>
  <!-- Navigation -->
  <header class="navbar">
    <div class="container">
      <a href="/" class="nav-brand text-gradient">SD.</a>
      
      <button class="mobile-menu-btn" aria-label="Toggle navigation">
        <i class="fas fa-bars"></i>
      </button>

      <div style="display: flex; align-items: center;">
        <nav class="nav-links">
          {% set active_page = active_page|default('home') %}
          <a href="/" class="{% if active_page == 'home' %}active{% endif %}">Home</a>
          <a href="/certifications" class="{% if active_page == 'certifications' %}active{% endif %}">Certifications</a>
          <a href="/badges" class="{% if active_page == 'badges' %}active{% endif %}">Badges</a>
          <a href="/projects" class="{% if active_page == 'projects' %}active{% endif %}">Projects</a>
          <a href="/about" class="{% if active_page == 'about' %}active{% endif %}">About Me</a>
          <a href="/contact" class="{% if active_page == 'contact' %}active{% endif %}">Contact</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
          <i class="fas fa-sun"></i>
        </button>
      </div>
    </div>
  </header>

  {% block content %}{% endblock %}

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Soumyajit Das. Built with FastAPI & uv. Hosted on Render.</p>
    </div>
  </footer>

  <script src="/static/main.js"></script>
</body>
</html>
